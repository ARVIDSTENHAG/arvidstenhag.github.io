<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 200px; padding: 15px; font-family: sans-serif; background: #0f172a; color: white; }
        h3 { margin-top: 0; color: #00ff88; font-size: 16px; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00ff88; }
        input:checked + .slider:before { transform: translateX(20px); }
        .status { margin-top: 10px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <h3>Growth Lab Tools</h3>
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <span>Highlighter</span>
        <label class="switch">
            <input type="checkbox" id="toggle">
            <span class="slider"></span>
        </label>
    </div>
    <p class="status">Status: <span id="status-text">On</span></p>
    <script src="popup.js"></script>
</body>
</html>
